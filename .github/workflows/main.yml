name: Hotel Management CI

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]

jobs:
    build-and-test:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                node-version: [18.x]
                mongodb-version: ["6.0"]

        steps:
            - uses: actions/checkout@v3

            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v3
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: "npm"
                  cache-dependency-path: server/package-lock.json

            - name: Start MongoDB
              uses: supercharge/mongodb-github-action@1.10.0
              with:
                  mongodb-version: ${{ matrix.mongodb-version }}

            - name: Install Server Dependencies
              run: |
                  cd server
                  npm ci

            - name: Run Server Tests
              run: |
                  cd server
                  # Create a dummy .env file for testing if needed, though dotenv/config usually ignores missing files nicely
                  echo "JWT_SECRET=test_secret" > .env
                  echo "MONGODB_URI=mongodb://localhost:27017/hotel_test" >> .env
                  npm test
